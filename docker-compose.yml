# Shared env for talon-core and talon-relay (single source — no duplicated lists).
x-talon-env: &talon-env
  HEXSTRIKE_SERVER_URL: http://localhost:${HEXSTRIKE_PORT:-8888}
  MSF_SERVER: localhost
  MSF_PORT: ${MSF_PORT:-5554}
  MSF_PASSWORD: ${MSF_PASSWORD:?MSF_PASSWORD must be set}
  MSF_SSL: ${MSF_SSL:-true}
  LHOST: ${LHOST:-127.0.0.1}
  LPORT: ${LPORT:-4444}
  LLM_PROVIDER: ${LLM_PROVIDER:-bedrock}
  LLM_CODE_PROVIDER: ${LLM_CODE_PROVIDER:-}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
  LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1000}
  OPENAI_HTTP_TIMEOUT: ${OPENAI_HTTP_TIMEOUT:-120s}
  OLLAMA_URL: http://localhost:${OLLAMA_PORT:-11434}
  OLLAMA_MAIN_MODEL: ${OLLAMA_MAIN_MODEL:-talon}
  OLLAMA_JUDGE_MODEL: ${OLLAMA_JUDGE_MODEL:-talon}
  OLLAMA_CODE_MODEL: ${OLLAMA_CODE_MODEL:-talon}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MAIN_MODEL: ${OPENAI_MAIN_MODEL:-glm-5.2}
  OPENAI_JUDGE_MODEL: ${OPENAI_JUDGE_MODEL:-glm-5.2}
  OPENAI_CODE_MODEL: ${OPENAI_CODE_MODEL:-glm-5.2}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}

services:
  # 0. Lab target (CVE-2011-2523). Profile: vuln. One Dockerfile, two targets:
  #   real (default) — infected vsftpd; MSF reverse_bash works
  #   mimic          — Python only; set VULN_TARGET=mimic
  #   docker compose --profile vuln up -d --build vuln-target
  vuln-target:
    build:
      context: ./vuln-target
      dockerfile: Dockerfile
      target: ${VULN_TARGET:-real}
    image: ${VULN_TARGET_IMAGE:-talon-vuln-target}
    container_name: talon_vuln_target
    profiles: ["vuln"]
    restart: unless-stopped
    network_mode: host

  # 1. Metasploit RPC (kali-msf/Dockerfile)
  metasploit:
    build:
      context: ./kali-msf
    image: ${MSF_IMAGE:-talon-msf-rpc}
    container_name: msf_rpc
    environment:
      MSF_PORT: ${MSF_PORT:-5554}
      MSF_PASSWORD: ${MSF_PASSWORD:?MSF_PASSWORD must be set}
    volumes:
      - ./msf-data:/root/.msf4
      - ./msf_payloads:/payloads
    restart: unless-stopped
    network_mode: host

  # 2. Arsenal Engine (arsenal-engine/Dockerfile)
  arsenal-engine:
    build:
      context: ./arsenal-engine
    image: ${ARSENAL_IMAGE:-talon-arsenal-engine}
    container_name: arsenal_engine
    privileged: true
    environment:
      API_PORT: ${HEXSTRIKE_PORT:-8888}
    restart: unless-stopped
    network_mode: host

  # 3. RabbitMQ -- backs Talon Relay's queue. Bundled so the stack is
  # runnable with a single `docker compose up` and no external broker.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: talon_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-talon}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set}
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    network_mode: host

  # 4. Ollama -- optional local LLM runtime. Only needed when LLM_PROVIDER=ollama
  # (or LLM_CODE_PROVIDER=ollama). Gated behind the "ollama" profile so a plain
  # `docker compose up -d` does NOT pull the ~3.2GB ollama image when you're
  # pointing at a hosted provider (bedrock/openai) instead.
  #   local stack:   docker compose --profile ollama up -d
  #   hosted stack:  docker compose up -d
  ollama:
    image: ollama/ollama:latest
    container_name: talon_ollama
    profiles: ["ollama"]
    volumes:
      - ./ollama-data:/root/.ollama
      - ./models:/models:ro          # so `ollama create talon -f /models/Modelfile` works in-container
    restart: unless-stopped
    network_mode: host

  # 5–6. Platform image (root Dockerfile): all Go binaries. Same image,
  # different command for core vs relay.
  talon-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TALON_IMAGE:-talon:latest}
    container_name: talon_core
    command: ["/app/talon-core"]
    environment:
      <<: *talon-env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - arsenal-engine
    restart: unless-stopped
    network_mode: host

  talon-relay:
    # Same platform image as talon-core (build once, run two commands).
    build:
      context: .
      dockerfile: Dockerfile
    image: ${TALON_IMAGE:-talon:latest}
    container_name: talon_relay
    command: ["/app/talon-relay"]
    environment:
      <<: *talon-env
      AMQP_URL: ${AMQP_URL:?AMQP_URL must be set}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - arsenal-engine
      - rabbitmq
    restart: unless-stopped
    network_mode: host
