services:
  # 1. Kali-based Metasploit RPC Server
  metasploit:
    build:
      context: ./kali-msf
      dockerfile: Dockerfile
    container_name: msf_rpc
    environment:
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
    volumes:
      - ./msf-data:/root/.msf4
      - ./msf_payloads:/payloads
    restart: unless-stopped
    network_mode: host

  # 2. Hexstrike AI Server
  hexstrike:
    image: ghcr.io/suryaaramesh/suryaarc-hexstrike:latest
    container_name: hexstrike
    privileged: true
    environment:
      - HEXSTRIKE_PORT=${HEXSTRIKE_PORT:-8888}
    restart: unless-stopped
    command: >
      bash -c "cd hexstrike-ai &&
      source hexstrike-env/bin/activate &&
      python hexstrike_server.py --port $HEXSTRIKE_PORT"
    network_mode: host

  # 3. Go API server (replaces pentest_core/fast_api.py) -- spawns
  # hexstrike-mcp and metasploit-mcp as local stdio subprocesses.
  api:
    build:
      context: ./go
      dockerfile: Dockerfile
    container_name: pentester2_api
    command: ["/app/api"]
    environment:
      - HEXSTRIKE_SERVER_URL=http://localhost:${HEXSTRIKE_PORT:-8888}
      - MSF_SERVER=localhost
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
      - MSF_SSL=${MSF_SSL:-true}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      # required so the codegen tool's `docker` CLI calls reach the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - hexstrike
    restart: unless-stopped
    network_mode: host

  # 4. Go queue worker (replaces executor.py's Celery task)
  worker:
    build:
      context: ./go
      dockerfile: Dockerfile
    container_name: pentester2_worker
    command: ["/app/worker"]
    environment:
      - AMQP_URL=${AMQP_URL:?AMQP_URL must be set}
      - HEXSTRIKE_SERVER_URL=http://localhost:${HEXSTRIKE_PORT:-8888}
      - MSF_SERVER=localhost
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
      - MSF_SSL=${MSF_SSL:-true}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - hexstrike
    restart: unless-stopped
    network_mode: host
