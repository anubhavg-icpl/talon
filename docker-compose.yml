services:
  # 1. Kali-based Metasploit RPC Server
  metasploit:
    build:
      context: ./kali-msf
      dockerfile: Dockerfile
    container_name: msf_rpc
    environment:
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
    volumes:
      - ./msf-data:/root/.msf4
      - ./msf_payloads:/payloads
    restart: unless-stopped
    network_mode: host

  # 2. Talon Arsenal Engine -- self-built tool-execution backend for Talon
  # Arsenal, built from source we control (see arsenal-engine/Dockerfile)
  # instead of a third-party prebuilt image.
  arsenal-engine:
    build:
      context: ./arsenal-engine
      dockerfile: Dockerfile
    container_name: arsenal_engine
    privileged: true
    environment:
      - API_PORT=${HEXSTRIKE_PORT:-8888}
    restart: unless-stopped
    network_mode: host

  # 3. RabbitMQ -- backs Talon Relay's queue. Bundled so the stack is
  # runnable with a single `docker compose up` and no external broker.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: talon_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-talon}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set}
    volumes:
      - ./rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    network_mode: host

  # 4. Ollama -- optional local LLM runtime. Only needed if LLM_PROVIDER=ollama;
  # bring it up explicitly with `docker compose up -d ollama talon-core ...`.
  ollama:
    image: ollama/ollama:latest
    container_name: talon_ollama
    volumes:
      - ./ollama-data:/root/.ollama
    restart: unless-stopped
    network_mode: host

  # 5. Talon Core -- the HTTP control plane, spawns Talon Arsenal and Talon
  # Strike as local stdio subprocesses.
  talon-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talon_core
    command: ["/app/talon-core"]
    environment:
      - HEXSTRIKE_SERVER_URL=http://localhost:${HEXSTRIKE_PORT:-8888}
      - MSF_SERVER=localhost
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
      - MSF_SSL=${MSF_SSL:-true}
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - OLLAMA_URL=http://localhost:${OLLAMA_PORT:-11434}
      - OLLAMA_MAIN_MODEL=${OLLAMA_MAIN_MODEL:-qwen2.5:14b}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-qwen2.5-coder:14b}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      # required so the codegen tool's `docker` CLI calls reach the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - arsenal-engine
    restart: unless-stopped
    network_mode: host

  # 6. Talon Relay -- the AMQP queue worker.
  talon-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talon_relay
    command: ["/app/talon-relay"]
    environment:
      - AMQP_URL=${AMQP_URL:?AMQP_URL must be set}
      - HEXSTRIKE_SERVER_URL=http://localhost:${HEXSTRIKE_PORT:-8888}
      - MSF_SERVER=localhost
      - MSF_PORT=${MSF_PORT:-5554}
      - MSF_PASSWORD=${MSF_PASSWORD:?MSF_PASSWORD must be set}
      - MSF_SSL=${MSF_SSL:-true}
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - OLLAMA_URL=http://localhost:${OLLAMA_PORT:-11434}
      - OLLAMA_MAIN_MODEL=${OLLAMA_MAIN_MODEL:-qwen2.5:14b}
      - OLLAMA_CODE_MODEL=${OLLAMA_CODE_MODEL:-qwen2.5-coder:14b}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - metasploit
      - arsenal-engine
      - rabbitmq
    restart: unless-stopped
    network_mode: host
