# Overlay: use the real infected vsftpd 2.3.4 image for Metasploit sessions.
#   docker build -f vuln-target/Dockerfile.real -t talon-vuln-vsftpd-real ./vuln-target
#   docker compose --profile vuln -f docker-compose.yml -f docker-compose.vuln-real.yml up -d --force-recreate vuln-target
services:
  vuln-target:
    image: talon-vuln-vsftpd-real
    build:
      context: ./vuln-target
      dockerfile: Dockerfile.real
    restart: unless-stopped
